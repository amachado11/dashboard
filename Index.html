<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanças Insight v2.2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F2F2F7; --card: #FFFFFF; --primary: #007AFF; --text: #1C1C1E; --text-sec: #8E8E93; --ganho: #34C759; --gasto: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .header { background: white; padding: 20px; border-bottom: 1px solid #d1d1d6; position: sticky; top: 0; z-index: 10; text-align: center; }
        .aba { display: none; padding: 15px; }
        .aba.ativa { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #d1d1d6; }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-sec); }
        .nav-btn.ativo { color: var(--primary); font-weight: bold; }
        .item-pendente { padding: 15px 0; border-bottom: 1px solid #eee; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }
        .select-cat { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--primary); background: #f0f7ff; color: var(--primary); font-weight: 500; appearance: none; }
        .badge { font-size: 10px; padding: 4px 8px; border-radius: 6px; background: #eee; color: #666; display: inline-block; margin: 2px; }
        .chart-box { height: 250px; margin: 10px auto; width: 250px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin: 5px 0; font-size: 16px; outline: none; }
        .btn-save { background: var(--ganho); color: white; border: none; font-weight: bold; margin-top: 10px; }
        .tipo-tag { font-size: 10px; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; margin-right: 5px; }
    </style>
</head>
<body>

<div class="header"><strong>Finanças Insight v2.2</strong></div>

<div id="aba-dash" class="aba ativa">
    <div style="display:flex; gap:10px; margin-bottom:15px">
        <div class="card" style="flex:1"><span>Total Ganhos</span><br><b style="color:var(--ganho)" id="d-ganhos">R$ 0</b></div>
        <div class="card" style="flex:1"><span>Total Gastos</span><br><b style="color:var(--gasto)" id="d-gastos">R$ 0</b></div>
    </div>
    <div class="card">
        <div style="text-align:center; font-weight:bold; margin-bottom:10px;">Distribuição de Gastos</div>
        <div class="chart-box"><canvas id="insightChart"></canvas></div>
        <div id="lista-detalhada" style="margin-top:20px"></div>
    </div>
</div>

<div id="aba-cat" class="aba">
    <div class="card">
        <strong>Categorização Inteligente</strong>
        <p style="font-size:12px; color:var(--text-sec); margin-bottom:15px">Classifique entradas e saídas do App 1:</p>
        <div id="lista-pendentes"></div>
    </div>
</div>

<div id="aba-config" class="aba">
    <div class="card">
        <strong>Gerenciar Categorias</strong>
        <div style="margin-bottom:10px">
            <small>Categorias de Gastos:</small>
            <div id="cats-gastos"></div>
        </div>
        <div style="margin-bottom:15px">
            <small>Categorias de Ganhos:</small>
            <div id="cats-ganhos"></div>
        </div>
        <input type="text" id="nova-cat-nome" placeholder="Nome da Categoria">
        <select id="nova-cat-tipo">
            <option value="gasto">Tipo: Gasto (Saída)</option>
            <option value="ganho">Tipo: Ganho (Entrada)</option>
        </select>
        <button class="btn-save" onclick="adicionarCategoria()">Criar Nova Categoria</button>
    </div>
    <div class="card">
        <strong>Regras Ativas</strong>
        <div id="lista-regras" style="font-size:13px; margin-top:10px"></div>
    </div>
</div>

<div class="nav">
    <button class="nav-btn ativo" onclick="ir('dash', this)">📊<br>Resumo</button>
    <button class="nav-btn" onclick="ir('cat', this)">🔍<br>Categorizar</button>
    <button class="nav-btn" onclick="ir('config', this)">⚙️<br>Ajustes</button>
</div>

<script>
    let dbOrigem = [];
    let regras = JSON.parse(localStorage.getItem('insight_regras')) || []; 
    let categorias = JSON.parse(localStorage.getItem('insight_categorias_v2')) || {
        gastos: ['Gasolina', 'Manutenção Carro', 'Aluguel', 'Luz', 'Água', 'Comida', 'Besteira', 'Empréstimos', 'Cartão crédito', 'Saúde'],
        ganhos: ['Uber', '99', 'Particular']
    };
    let meuChart = null;

    function ir(aba, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
        document.getElementById('aba-' + aba).classList.add('ativa');
        btn.classList.add('ativo');
        if(aba === 'dash') renderDash();
        if(aba === 'cat') renderCategorizacao();
        if(aba === 'config') renderConfig();
    }

    function adicionarCategoria() {
        const nome = document.getElementById('nova-cat-nome').value.trim();
        const tipo = document.getElementById('nova-cat-tipo').value;
        if(!nome) return;
        if(tipo === 'gasto') { if(!categorias.gastos.includes(nome)) categorias.gastos.push(nome); }
        else { if(!categorias.ganhos.includes(nome)) categorias.ganhos.push(nome); }
        localStorage.setItem('insight_categorias_v2', JSON.stringify(categorias));
        document.getElementById('nova-cat-nome').value = "";
        renderConfig();
    }

    function salvarRegra(termo, selectElement, tipoOriginal) {
        const catDestino = selectElement.value;
        if(!catDestino) return;
        regras = regras.filter(r => r.termo !== termo.toLowerCase());
        regras.push({ termo: termo.toLowerCase(), categoria: catDestino, tipo: tipoOriginal });
        localStorage.setItem('insight_regras', JSON.stringify(regras));
        renderCategorizacao();
    }

    function aplicarRegras(item) {
        const regraEncontrada = regras.find(r => item.desc.toLowerCase().includes(r.termo));
        return regraEncontrada ? regraEncontrada.categoria : 'Não Categorizado';
    }

    function renderCategorizacao() {
        dbOrigem = JSON.parse(localStorage.getItem('financas_v_final')) || [];
        const lista = document.getElementById('lista-pendentes');
        lista.innerHTML = "";
        
        let pendentes = [];
        dbOrigem.forEach(i => {
            if(aplicarRegras(i) === 'Não Categorizado') {
                if(!pendentes.some(p => p.desc === i.desc)) pendentes.push(i);
            }
        });

        if(pendentes.length === 0) {
            lista.innerHTML = "<div style='text-align:center; padding:20px; color:var(--ganho)'><b>✨ Tudo organizado!</b></div>";
            return;
        }

        pendentes.forEach(item => {
            let options = (item.tipo === 'ganho' ? categorias.ganhos : categorias.gastos)
                .map(c => `<option value="${c}">${c}</option>`).join('');
            
            lista.innerHTML += `
                <div class="item-pendente">
                    <div class="item-header">
                        <span><span class="tipo-tag" style="background:${item.tipo==='ganho'?'#34C75922':'#FF3B3022'}; color:${item.tipo==='ganho'?'var(--ganho)':'var(--gasto)'}">${item.tipo==='ganho'?'Entrada':'Saída'}</span>${item.desc}</span>
                    </div>
                    <select class="select-cat" onchange="salvarRegra('${item.desc}', this, '${item.tipo}')">
                        <option value="">Selecionar categoria...</option>
                        ${options}
                    </select>
                </div>`;
        });
    }

    function renderDash() {
        dbOrigem = JSON.parse(localStorage.getItem('financas_v_final')) || [];
        let totaisGastos = {};
        let totalGanhosValor = 0;

        dbOrigem.forEach(i => {
            const v = parseFloat(i.valor);
            const cat = aplicarRegras(i);
            if(i.tipo === 'ganho') totalGanhosValor += v;
            else { totaisGastos[cat] = (totaisGastos[cat] || 0) + v; }
        });

        document.getElementById('d-ganhos').innerText = `R$ ${totalGanhosValor.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        const totalGastosValor = Object.values(totaisGastos).reduce((a, b) => a + b, 0);
        document.getElementById('d-gastos').innerText = `R$ ${totalGastosValor.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;

        const ctx = document.getElementById('insightChart').getContext('2d');
        const labels = Object.keys(totaisGastos).filter(k => totaisGastos[k] > 0).sort((a,b) => totaisGastos[b] - totaisGastos[a]);
        const valores = labels.map(l => totaisGastos[l]);

        if(meuChart) meuChart.destroy();
        meuChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{ 
                    data: valores, 
                    backgroundColor: ['#FF3B30', '#5AC8FA', '#FFCC00', '#AF52DE', '#FF9500', '#5856D6', '#007AFF', '#34C759', '#8E8E93', '#E5E5EA'],
                    borderWidth: 2
                }]
            },
            options: { cutout: '70%', plugins: { legend: { display: false } } }
        });

        const ld = document.getElementById('lista-detalhada');
        ld.innerHTML = labels.map(l => `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee; font-size:14px">
                <span>${l}</span>
                <b>R$ ${totaisGastos[l].toLocaleString('pt-br', {minimumFractionDigits: 2})}</b>
            </div>
        `).join('');
    }

    function renderConfig() {
        document.getElementById('cats-gastos').innerHTML = categorias.gastos.map(c => `<span class="badge" style="border-left: 3px solid var(--gasto)">${c}</span>`).join('');
        document.getElementById('cats-ganhos').innerHTML = categorias.ganhos.map(c => `<span class="badge" style="border-left: 3px solid var(--ganho)">${c}</span>`).join('');
        const r = document.getElementById('lista-regras');
        r.innerHTML = regras.map((reg, idx) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px; background:#f9f9f9; padding:10px; border-radius:8px">
                <span style="font-size:12px">"${reg.termo}" ➔ <b style="color:var(--primary)">${reg.categoria}</b></span>
                <span onclick="removerRegra(${idx})" style="color:red; font-weight:bold; padding:0 5px">✕</span>
            </div>`).join('');
    }

    function removerRegra(idx) {
        regras.splice(idx, 1);
        localStorage.setItem('insight_regras', JSON.stringify(regras));
        renderConfig();
    }

    window.onload = () => { renderDash(); };
</script>
</body>
</html>
