<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanças Insight v3.1</title>
    <style>
        :root { --bg: #F2F2F7; --card: #FFFFFF; --primary: #007AFF; --text: #1C1C1E; --text-sec: #8E8E93; --ganho: #34C759; --gasto: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #d1d1d6; position: sticky; top: 0; z-index: 10; text-align: center; }
        .aba { display: none; padding: 15px; }
        .aba.ativa { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #d1d1d6; z-index: 100; }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-sec); }
        .nav-btn.ativo { color: var(--primary); font-weight: bold; }
        .seletor-datas { display: flex; gap: 10px; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 12px; border: 1px solid #ddd; }
        .seletor-datas input { width: 100%; border: 1px solid #eee; padding: 8px; border-radius: 6px; font-size: 13px; }
        .item-lista { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f2f2f7; font-size: 14px; }
    </style>
</head>
<body>

<div class="header"><strong>Finanças Insight v3.1</strong></div>

<div id="aba-dash" class="aba ativa">
    <div class="seletor-datas">
        <div style="flex:1"><small>DE:</small><br><input type="date" id="data-inicio" onchange="renderDash()"></div>
        <div style="flex:1"><small>ATÉ:</small><br><input type="date" id="data-fim" onchange="renderDash()"></div>
    </div>

    <div class="card" style="text-align: center;">
        <small style="color:var(--text-sec)">Saldo Período</small><br>
        <b style="font-size: 26px;" id="d-saldo">R$ 0,00</b>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px">
        <div class="card" style="flex:1">Ganhos<br><b style="color:var(--ganho)" id="d-ganhos">R$ 0</b></div>
        <div class="card" style="flex:1">Gastos<br><b style="color:var(--gasto)" id="d-gastos">R$ 0</b></div>
    </div>

    <div class="card"><strong>Resumo Ganhos</strong><div id="lista-ganhos"></div></div>
    <div class="card"><strong>Resumo Gastos</strong><div id="lista-gastos"></div></div>
</div>

<div id="aba-cat" class="aba"><div class="card" id="lista-pendentes"></div></div>
<div id="aba-config" class="aba"><div class="card">⚙️ Configurações salvas no navegador.</div></div>

<div class="nav">
    <button class="nav-btn ativo" onclick="ir('dash', this)">📊<br>Resumo</button>
    <button class="nav-btn" onclick="ir('cat', this)">🔍<br>Categorizar</button>
    <button class="nav-btn" onclick="ir('config', this)">⚙️<br>Ajustes</button>
</div>

<script>
    let dbOrigem = [];
    let regras = JSON.parse(localStorage.getItem('insight_regras')) || []; 

    function initDatas() {
        const agora = new Date();
        const y = agora.getFullYear(), m = agora.getMonth();
        // Formato para o input date: YYYY-MM-DD
        document.getElementById('data-inicio').value = new Date(y, m, 1).toISOString().split('T')[0];
        document.getElementById('data-fim').value = agora.toISOString().split('T')[0];
    }

    // A função que resolve o erro: converte "DD/MM/AAAA" para milissegundos comparáveis
    function converterParaTime(dataBr) {
        const parts = dataBr.split('/');
        // Cria a data ao meio-dia para evitar erro de fuso
        return new Date(parts[2], parts[1] - 1, parts[0], 12, 0, 0).getTime();
    }

    function aplicarRegras(item) {
        const r = regras.find(reg => item.desc.trim().toLowerCase() === reg.termo);
        return r ? r.categoria : 'Não Categorizado';
    }

    function renderDash() {
        dbOrigem = JSON.parse(localStorage.getItem('financas_v_final')) || [];
        
        // Pega as datas do seletor e ajusta para o meio-dia
        const dIniParts = document.getElementById('data-inicio').value.split('-');
        const dFimParts = document.getElementById('data-fim').value.split('-');
        const timeIni = new Date(dIniParts[0], dIniParts[1]-1, dIniParts[2], 0, 0, 0).getTime();
        const timeFim = new Date(dFimParts[0], dFimParts[1]-1, dFimParts[2], 23, 59, 59).getTime();

        let tGastos = {}, tGanhos = {}, vGanhos = 0, vGastos = 0;

        dbOrigem.forEach(i => {
            const timeItem = converterParaTime(i.data);
            if (timeItem >= timeIni && timeItem <= timeFim) {
                const v = parseFloat(i.valor), cat = aplicarRegras(i);
                if(i.tipo === 'ganho') { vGanhos += v; tGanhos[cat] = (tGanhos[cat] || 0) + v; }
                else { vGastos += v; tGastos[cat] = (tGastos[cat] || 0) + v; }
            }
        });

        document.getElementById('d-saldo').innerText = `R$ ${(vGanhos - vGastos).toLocaleString('pt-br',{minimumFractionDigits:2})}`;
        document.getElementById('d-ganhos').innerText = `R$ ${vGanhos.toLocaleString('pt-br',{minimumFractionDigits:2})}`;
        document.getElementById('d-gastos').innerText = `R$ ${vGastos.toLocaleString('pt-br',{minimumFractionDigits:2})}`;

        const gerarLista = (obj) => Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([c, v]) => `
            <div class="item-lista"><span>${c}</span><b>R$ ${v.toLocaleString('pt-br',{minimumFractionDigits:2})}</b></div>
        `).join('') || "<small>Vazio</small>";

        document.getElementById('lista-ganhos').innerHTML = gerarLista(tGanhos);
        document.getElementById('lista-gastos').innerHTML = gerarLista(tGastos);
    }

    function ir(aba, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
        document.getElementById('aba-' + aba).classList.add('ativa');
        btn.classList.add('ativo');
        if(aba === 'dash') renderDash();
    }

    window.onload = () => { initDatas(); renderDash(); };
</script>
</body>
</html>
