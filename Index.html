<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanças Insight v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F2F2F7; --card: #FFFFFF; --primary: #007AFF; --text: #1C1C1E; --text-sec: #8E8E93; --ganho: #34C759; --gasto: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .header { background: white; padding: 20px; border-bottom: 1px solid #d1d1d6; position: sticky; top: 0; z-index: 10; text-align: center; }
        .aba { display: none; padding: 15px; }
        .aba.ativa { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 75px; border-top: 1px solid #d1d1d6; }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-sec); }
        .nav-btn.ativo { color: var(--primary); font-weight: bold; }

        /* Categorização */
        .item-pendente { padding: 15px 0; border-bottom: 1px solid #eee; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }
        .select-cat { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--primary); background: #f0f7ff; color: var(--primary); font-weight: 500; }
        
        .badge { font-size: 10px; padding: 4px 8px; border-radius: 6px; background: #eee; color: #666; display: inline-block; margin: 2px; }
        .chart-box { height: 250px; margin: 10px auto; width: 250px; }
        
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin: 5px 0; font-size: 16px; outline: none; }
        .btn-save { background: var(--ganho); color: white; border: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <strong id="titulo-aba">Finanças Insight</strong>
</div>

<div id="aba-dash" class="aba ativa">
    <div style="display:flex; gap:10px; margin-bottom:15px">
        <div class="card" style="flex:1"><span>Ganhos</span><br><b style="color:var(--ganho)" id="d-ganhos">R$ 0</b></div>
        <div class="card" style="flex:1"><span>Gastos</span><br><b style="color:var(--gasto)" id="d-gastos">R$ 0</b></div>
    </div>
    <div class="card">
        <div class="chart-box"><canvas id="insightChart"></canvas></div>
        <div id="lista-detalhada" style="margin-top:20px"></div>
    </div>
</div>

<div id="aba-cat" class="aba">
    <div class="card">
        <strong>Categorização Inteligente</strong>
        <p style="font-size:12px; color:var(--text-sec); margin-bottom:15px">Selecione o destino para cada descrição encontrada no App 1:</p>
        <div id="lista-pendentes"></div>
    </div>
</div>

<div id="aba-config" class="aba">
    <div class="card">
        <strong>Gerenciar Categorias</strong>
        <div id="minhas-cats" style="margin: 15px 0;"></div>
        <input type="text" id="nova-cat-nome" placeholder="Nome (Ex: Combustível, Manutenção...)">
        <button class="btn-save" onclick="adicionarCategoria()">Criar Nova Categoria</button>
    </div>
    <div class="card">
        <strong>Regras Criadas</strong>
        <div id="lista-regras" style="font-size:13px; margin-top:10px"></div>
    </div>
</div>

<div class="nav">
    <button class="nav-btn ativo" onclick="ir('dash', this)">📊<br>Resumo</button>
    <button class="nav-btn" onclick="ir('cat', this)">🔍<br>Categorizar</button>
    <button class="nav-btn" onclick="ir('config', this)">⚙️<br>Ajustes</button>
</div>

<script>
    let dbOrigem = [];
    let regras = JSON.parse(localStorage.getItem('insight_regras')) || []; 
    let categorias = JSON.parse(localStorage.getItem('insight_categorias')) || ['Operacional', 'Pessoal', 'Fixos'];
    let meuChart = null;

    function ir(aba, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
        document.getElementById('aba-' + aba).classList.add('ativa');
        btn.classList.add('ativo');
        
        if(aba === 'dash') renderDash();
        if(aba === 'cat') renderCategorizacao();
        if(aba === 'config') renderConfig();
    }

    function adicionarCategoria() {
        const nome = document.getElementById('nova-cat-nome').value.trim();
        if(!nome || categorias.includes(nome)) return;
        categorias.push(nome);
        localStorage.setItem('insight_categorias', JSON.stringify(categorias));
        document.getElementById('nova-cat-nome').value = "";
        renderConfig();
    }

    // Criar regra usando o Drop-down
    function salvarRegra(termo, selectElement) {
        const catDestino = selectElement.value;
        if(!catDestino) return;

        // Remover regra antiga se houver para o mesmo termo
        regras = regras.filter(r => r.termo !== termo.toLowerCase());
        
        regras.push({ termo: termo.toLowerCase(), categoria: catDestino });
        localStorage.setItem('insight_regras', JSON.stringify(regras));
        
        // Feedback visual rápido
        selectElement.style.borderColor = "var(--ganho)";
        setTimeout(() => { renderCategorizacao(); }, 500);
    }

    function aplicarRegras(item) {
        if(item.tipo === 'ganho') return 'Ganhos';
        const regraEncontrada = regras.find(r => item.desc.toLowerCase().includes(r.termo));
        return regraEncontrada ? regraEncontrada.categoria : 'Não Categorizado';
    }

    function renderCategorizacao() {
        dbOrigem = JSON.parse(localStorage.getItem('financas_v_final')) || [];
        const lista = document.getElementById('lista-pendentes');
        lista.innerHTML = "";
        
        let pendentes = [];
        dbOrigem.forEach(i => {
            if(i.tipo === 'gasto' && aplicarRegras(i) === 'Não Categorizado') {
                if(!pendentes.includes(i.desc)) pendentes.push(i.desc);
            }
        });

        if(pendentes.length === 0) {
            lista.innerHTML = "<div style='text-align:center; padding:20px; color:var(--ganho)'><b>✨ Tudo organizado!</b><br>Não há novos itens para categorizar.</div>";
            return;
        }

        pendentes.forEach(desc => {
            let options = categorias.map(c => `<option value="${c}">${c}</option>`).join('');
            lista.innerHTML += `
                <div class="item-pendente">
                    <div class="item-header"><span>${desc}</span></div>
                    <select class="select-cat" onchange="salvarRegra('${desc}', this)">
                        <option value="">Selecionar categoria...</option>
                        ${options}
                    </select>
                </div>`;
        });
    }

    function renderDash() {
        dbOrigem = JSON.parse(localStorage.getItem('financas_v_final')) || [];
        let totais = { 'Ganhos': 0, 'Não Categorizado': 0 };
        categorias.forEach(c => totais[c] = 0);

        dbOrigem.forEach(i => {
            const catFinal = aplicarRegras(i);
            totais[catFinal] = (totais[catFinal] || 0) + parseFloat(i.valor);
        });

        document.getElementById('d-ganhos').innerText = `R$ ${totais['Ganhos'].toLocaleString()}`;
        const totalGastos = Object.keys(totais).filter(k => k !== 'Ganhos').reduce((acc, k) => acc + totais[k], 0);
        document.getElementById('d-gastos').innerText = `R$ ${totalGastos.toLocaleString()}`;

        const ctx = document.getElementById('insightChart').getContext('2d');
        const labels = Object.keys(totais).filter(k => k !== 'Ganhos' && totais[k] > 0);
        const valores = labels.map(l => totais[l]);

        if(meuChart) meuChart.destroy();
        meuChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{ 
                    data: valores, 
                    backgroundColor: ['#FF3B30', '#5AC8FA', '#FFCC00', '#AF52DE', '#FF9500', '#5856D6', '#007AFF', '#8E8E93'],
                    borderWidth: 2
                }]
            },
            options: { cutout: '70%', plugins: { legend: { display: true, position: 'bottom' } } }
        });

        // Lista Detalhada abaixo do gráfico
        const ld = document.getElementById('lista-detalhada');
        ld.innerHTML = labels.map(l => `
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:14px">
                <span>${l}</span>
                <b>R$ ${totais[l].toFixed(2)}</b>
            </div>
        `).join('');
    }

    function renderConfig() {
        document.getElementById('minhas-cats').innerHTML = categorias.map(c => `<span class="badge">${c}</span>`).join('');
        const r = document.getElementById('lista-regras');
        r.innerHTML = regras.map((reg, idx) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px; background:#f9f9f9; padding:8px; border-radius:6px">
                <span>"${reg.termo}" ➔ <b>${reg.categoria}</b></span>
                <span onclick="removerRegra(${idx})" style="color:red; font-weight:bold">X</span>
            </div>`).join('');
    }

    function removerRegra(idx) {
        regras.splice(idx, 1);
        localStorage.setItem('insight_regras', JSON.stringify(regras));
        renderConfig();
    }

    window.onload = () => { renderDash(); };
</script>
</body>
</html>
